# TRMT Auto-Deploy via Vercel
#
# NOTE: Vercel's GitHub App integration already auto-deploys every push
# to main (that is the canonical deploy path — verifiable in the Vercel
# dashboard). This workflow is kept as a belt-and-suspenders redundancy
# and for the green "deploy" check mark on PRs.
#
# The old `amondnet/vercel-action@v25` pinned a Vercel CLI that the
# Vercel API no longer accepts ("CLI version is outdated, requires
# 47.2.2 or later"), so every push to main surfaced a failure email
# even though the actual site deployed fine via the GitHub App.
# Replaced with a direct `npm install --global vercel@latest` flow
# that always pulls the latest CLI.
#
# Required Secrets:
#   VERCEL_TOKEN      - https://vercel.com/account/tokens
#   VERCEL_ORG_ID     - from .vercel/project.json
#   VERCEL_PROJECT_ID - from .vercel/project.json

name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'svelte.config.js'
      - 'tailwind.config.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI (latest)
        run: npm install --global vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
