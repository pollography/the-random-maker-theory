# TRMT Daily Content Pipeline
# Laeuft jeden Morgen um 6:00 UTC (= 7:00 CET / 8:00 CEST)
# Fetcht RSS-News, waehlt Top-Thema, erstellt Blog-Artikel
#
# Ablauf:
#   1. RSS-Feeds aggregieren → Top-Themen identifizieren
#   2. Thema-Brief erstellen (JSON)
#   3. Content Engine triggern (via Claude Code / NotebookLM)
#   4. Assets optimieren (Bilder auf max 180KB WebP)
#   5. Git commit + push → Vercel deployed automatisch
#   6. Suchmaschinen benachrichtigen (IndexNow + GSC)
#
# Required Secrets:
#   VERCEL_TOKEN        - Vercel API Token (shared with deploy.yml)
#   NOTEBOOKLM_TOKEN    - NotebookLM CLI Auth Token
#   YOUTUBE_CLIENT_SECRET - YouTube API OAuth (fuer spaeteres Auto-Upload)
#   INDEXNOW_KEY        - IndexNow API Key (optional, kann auch aus static/ gelesen werden)
#
# HINWEIS: Dieses Workflow ist ein FRAMEWORK. Phase 3 (Content Generation)
# benoetigt Claude Code / NotebookLM CLI im Runner. Aktuell markiert als
# TODO bis die CI-Integration steht. Die umliegenden Schritte (RSS, Assets,
# Deploy, Indexing) funktionieren bereits.

name: Daily Content Pipeline

on:
  schedule:
    # Jeden Tag um 06:00 UTC (= 07:00 CET Winter / 08:00 CEST Sommer)
    - cron: '0 6 * * *'

  # Manueller Trigger fuer Tests
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optionales Thema (leer = RSS Top-Thema)'
        required: false
        type: string
      dry_run:
        description: 'Nur RSS fetchen, kein Content erstellen'
        required: false
        type: boolean
        default: false

env:
  PYTHONIOENCODING: utf-8
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # JOB 1: RSS Aggregieren + Thema waehlen
  # ============================================================
  fetch-topics:
    runs-on: ubuntu-latest
    outputs:
      topic_title: ${{ steps.select.outputs.topic_title }}
      topic_link: ${{ steps.select.outputs.topic_link }}
      topic_source: ${{ steps.select.outputs.topic_source }}
      topic_json: ${{ steps.select.outputs.topic_json }}
      has_topic: ${{ steps.select.outputs.has_topic }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fetch RSS Feeds
        id: rss
        run: |
          python scripts/rss-fetch.py --top 5 --hours 24 --json --save > /tmp/rss-top5.json
          echo "Fetched RSS feeds"
          cat /tmp/rss-top5.json | head -50

      - name: Select Topic
        id: select
        run: |
          # Manuelles Thema hat Vorrang
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            echo "topic_title=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
            echo "topic_link=" >> $GITHUB_OUTPUT
            echo "topic_source=manual" >> $GITHUB_OUTPUT
            echo "has_topic=true" >> $GITHUB_OUTPUT
            echo "Selected manual topic: ${{ github.event.inputs.topic }}"
          else
            # Top-1 aus RSS nehmen
            TITLE=$(python3 -c "
          import json, sys
          with open('/tmp/rss-top5.json') as f:
              data = json.load(f)
          if data:
              print(data[0]['title'])
          else:
              print('')
          ")
            LINK=$(python3 -c "
          import json
          with open('/tmp/rss-top5.json') as f:
              data = json.load(f)
          if data:
              print(data[0].get('link', ''))
          else:
              print('')
          ")
            SOURCE=$(python3 -c "
          import json
          with open('/tmp/rss-top5.json') as f:
              data = json.load(f)
          if data:
              print(data[0].get('source_name', ''))
          else:
              print('')
          ")

            if [ -n "$TITLE" ]; then
              echo "topic_title=$TITLE" >> $GITHUB_OUTPUT
              echo "topic_link=$LINK" >> $GITHUB_OUTPUT
              echo "topic_source=$SOURCE" >> $GITHUB_OUTPUT
              echo "has_topic=true" >> $GITHUB_OUTPUT
              echo "Selected RSS topic: $TITLE"
            else
              echo "has_topic=false" >> $GITHUB_OUTPUT
              echo "No topics found in RSS feeds"
            fi
          fi

      - name: Upload RSS Digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rss-digest
          path: output/rss-digest/
          retention-days: 7

  # ============================================================
  # JOB 2: Content erstellen (TODO: Claude Code CI Integration)
  # ============================================================
  create-content:
    needs: fetch-topics
    if: needs.fetch-topics.outputs.has_topic == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          pip install Pillow --break-system-packages

      - name: Display Topic
        run: |
          echo "==============================="
          echo "Topic: ${{ needs.fetch-topics.outputs.topic_title }}"
          echo "Source: ${{ needs.fetch-topics.outputs.topic_source }}"
          echo "Link: ${{ needs.fetch-topics.outputs.topic_link }}"
          echo "==============================="

      # -------------------------------------------------------
      # TODO: Content Generation via Claude Code / NotebookLM
      # -------------------------------------------------------
      # Sobald NotebookLM CLI in CI lauffaehig ist:
      #
      # - name: Generate Content
      #   env:
      #     NOTEBOOKLM_TOKEN: ${{ secrets.NOTEBOOKLM_TOKEN }}
      #   run: |
      #     python scripts/daily-content.py \
      #       --topic "${{ needs.fetch-topics.outputs.topic_title }}" \
      #       --link "${{ needs.fetch-topics.outputs.topic_link }}" \
      #       --source "${{ needs.fetch-topics.outputs.topic_source }}"
      #
      # Bis dahin: Manuell ueber Claude Code Desktop ausfuehren
      # mit dem TRMT Content Engine Skill

      - name: Content Generation Placeholder
        run: |
          echo "[INFO] Content Generation ist aktuell manuell."
          echo "[INFO] Nutze den TRMT Content Engine Skill in Claude Code:"
          echo "  'Schreib einen Artikel ueber: ${{ needs.fetch-topics.outputs.topic_title }}'"
          echo ""
          echo "Das Topic wurde aus den RSS-Feeds ausgewaehlt."
          echo "RSS Digest ist als Artifact verfuegbar."

  # ============================================================
  # JOB 3: Post-Deploy Indexing (laeuft nach jedem Push zu main)
  # ============================================================
  notify-search-engines:
    needs: create-content
    if: always() && needs.create-content.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Notify Search Engines
        run: |
          python scripts/index-notify.py
