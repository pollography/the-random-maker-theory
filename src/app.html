<!doctype html>
<html lang="de" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0b0b0b" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

		<!-- Google Search Console Verification -->
		<meta name="google-site-verification" content="KdlT78vqZt9-rj8PxTW8p3V0tQyr-9Apu9EjMWD8s3s" />

		<!-- Theme: Dark default, localStorage override -->
		<script>
			(function() {
				var t = localStorage.getItem('theme') || 'dark';
				document.documentElement.setAttribute('data-theme', t);
				if (t === 'dark') document.documentElement.classList.add('dark');
				else document.documentElement.classList.remove('dark');
			})();
		</script>

		<!-- Umami Analytics: wird erst nach Cookie-Consent geladen (CookieBanner.svelte) -->
		<script>window.__UMAMI_ID = 'baab8505-1eee-4706-adeb-4bfea05b4771';</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="dark bg-bg text-text">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
